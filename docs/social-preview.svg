<?xml version="1.0" encoding="UTF-8"?>
<!--
  Chord · GitHub Social Preview
  1200 × 630 · 适配 GitHub Settings → Social preview · X(Twitter)分享卡片
  设计：G 浮云·粉 · DM Serif + Source Serif italic + Noto Sans SC
  转 PNG：在浏览器打开本文件 → 截图；或 qlmanage -t -s 1200 -o . social-preview.svg
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#F5C0BE"/>
      <stop offset="50%" stop-color="#C8B8D8"/>
      <stop offset="100%" stop-color="#A8C8E0"/>
    </linearGradient>
    <radialGradient id="bgwash" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FDF0EF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFCFA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="#FFFCFA"/>
  <rect width="1200" height="630" fill="url(#bgwash)"/>

  <!-- 顶部渐变条 3px -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#grad)"/>

  <!-- Logo B · 居中上方 · 120×100 -->
  <g transform="translate(540, 110)">
    <!-- C 外弧 -->
    <path d="M82 18 Q28 18 28 50 Q28 82 82 82"
          stroke="#D9706A" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- 内弧（回响层次）-->
    <path d="M82 34 Q44 34 44 50 Q44 66 82 66"
          stroke="#D9706A" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
    <!-- 3 个共鸣点 -->
    <circle cx="87"  cy="50" r="4"   fill="#D9706A"/>
    <circle cx="99"  cy="50" r="2.8" fill="#D9706A" opacity="0.65"/>
    <circle cx="109" cy="50" r="1.8" fill="#D9706A" opacity="0.35"/>
  </g>

  <!-- 主标题 · Chord · 回响 -->
  <text x="600" y="290"
        font-family="'DM Serif Display','Noto Serif SC',Georgia,serif"
        font-size="84" font-weight="400"
        fill="#2A1520" text-anchor="middle" letter-spacing="-0.5">
    Chord · 回响
  </text>

  <!-- 中文副标 · italic serif (问句调) -->
  <text x="600" y="350"
        font-family="'Source Serif 4','Noto Serif SC',Georgia,serif"
        font-size="30" font-style="italic"
        fill="#7A5560" text-anchor="middle">
    当收藏开始回应你
  </text>

  <!-- 英文副标 -->
  <text x="600" y="395"
        font-family="'DM Sans','Helvetica Neue',system-ui,sans-serif"
        font-size="22" font-weight="400"
        fill="#B89098" text-anchor="middle" letter-spacing="0.5">
    Re-meet your bookmarks · A Chrome extension
  </text>

  <!-- 渐变 divider · 220 宽 -->
  <line x1="490" y1="450" x2="710" y2="450"
        stroke="url(#grad)" stroke-width="2" stroke-linecap="round"/>

  <!-- 3 维身份 hint (底部装饰) -->
  <g transform="translate(600, 510)" text-anchor="middle"
     font-family="'DM Mono','SF Mono','Menlo',monospace"
     font-size="14" letter-spacing="2"
     fill="#7A5560">
    <text x="-180" y="0">消费风格</text>
    <text x="0"    y="0" fill="#D9706A" font-weight="600">×</text>
    <text x="0"    y="-22" fill="#D9706A" opacity="0.3" font-size="10">CHORD TRIAD</text>
    <text x="180"  y="0">心境 × 半径</text>
  </g>

  <!-- 底部 url / 装饰 -->
  <text x="600" y="585"
        font-family="'DM Mono','SF Mono','Menlo',monospace"
        font-size="13" letter-spacing="2"
        fill="#B89098" text-anchor="middle">
    github.com/hahalong/chord
  </text>

  <!-- 4 个角落樱花点缀（极淡）-->
  <g fill="#F5C0BE" opacity="0.35">
    <circle cx="80"   cy="80"  r="3"/>
    <circle cx="1120" cy="80"  r="3"/>
    <circle cx="80"   cy="550" r="3"/>
    <circle cx="1120" cy="550" r="3"/>
  </g>
</svg>
