<?xml version="1.0" encoding="UTF-8"?>
<!-- Chord Store Screenshot 1 · Popup · 1280 × 800 · 居中产品摄影风 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#F5C0BE"/>
      <stop offset="50%" stop-color="#C8B8D8"/>
      <stop offset="100%" stop-color="#A8C8E0"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#FDF0EF" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FFF5F4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFCFA" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFCFA"/>
    </linearGradient>
    <filter id="bigShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="16" result="o1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="o2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 cream + radial wash -->
  <rect width="1280" height="800" fill="#FFFCFA"/>
  <rect width="1280" height="800" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="1280" height="3" fill="url(#grad)"/>

  <!-- 顶部 caption · 极简 -->
  <g transform="translate(640, 65)">
    <text x="0" y="0" font-family="'DM Mono','SF Mono',monospace" font-size="12"
          letter-spacing="4" fill="#D9706A" opacity="0.7" text-anchor="middle">
      CHORD · 每日回响
    </text>
    <text x="0" y="38" font-family="'DM Serif Display','Noto Serif SC',Georgia,serif"
          font-size="32" fill="#2A1520" text-anchor="middle" letter-spacing="-0.3">
      每天一条 · 二向决策 · 不再积压
    </text>
  </g>

  <!-- 主体 · popup 居中放大到 ~440×640 -->
  <g transform="translate(420, 130)" filter="url(#bigShadow)">
    <!-- 外卡 -->
    <rect x="0" y="0" width="440" height="640" rx="20" fill="url(#cardGrad)" stroke="#F0E0DF" stroke-width="1"/>
    <rect x="0" y="0" width="440" height="4" rx="2" fill="url(#grad)"/>

    <!-- popup header -->
    <g transform="translate(28, 32)">
      <!-- Logo B -->
      <g transform="scale(0.5)">
        <path d="M82 18 Q28 18 28 50 Q28 82 82 82" stroke="#D9706A" stroke-width="5" stroke-linecap="round" fill="none"/>
        <path d="M82 34 Q44 34 44 50 Q44 66 82 66" stroke="#D9706A" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
        <circle cx="87"  cy="50" r="4"   fill="#D9706A"/>
        <circle cx="99"  cy="50" r="2.8" fill="#D9706A" opacity="0.65"/>
        <circle cx="109" cy="50" r="1.8" fill="#D9706A" opacity="0.35"/>
      </g>
      <text x="68" y="22" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="22" fill="#2A1520">回响</text>
      <text x="68" y="42" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="11" fill="#B89098">你的书房</text>

      <!-- 168 大数字 -->
      <text x="270" y="36" font-family="'DM Mono',monospace" font-size="32" font-weight="600" fill="#D9706A" text-anchor="end">168</text>
      <text x="270" y="52" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="11" fill="#7A5560" text-anchor="end">条待处理</text>

      <!-- streak chip -->
      <g transform="translate(282, 12)">
        <rect x="0" y="0" width="96" height="36" rx="18" fill="#FDF0EF"/>
        <text x="48" y="23" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="13" font-weight="600" fill="#D9706A" text-anchor="middle">🌸 17 天</text>
      </g>
    </g>

    <!-- 卡片区 -->
    <g transform="translate(28, 108)">
      <rect x="0" y="0" width="384" height="386" rx="14" fill="#FFFCFA" stroke="#F0E0DF" stroke-width="1"/>

      <!-- 樱花暗示 -->
      <g opacity="0.2">
        <circle cx="336" cy="42" r="5" fill="#F5C0BE"/>
        <circle cx="354" cy="58" r="3.5" fill="#FFB7C5"/>
        <circle cx="318" cy="68" r="3" fill="#FADADD"/>
        <circle cx="346" cy="80" r="2.5" fill="#FFD6E0"/>
      </g>

      <!-- eyebrow -->
      <text x="22" y="36" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="12" fill="#B89098" letter-spacing="0.5">
        今日回响  ·  2 年 4 个月前
      </text>

      <!-- favicon + domain -->
      <g transform="translate(22, 54)">
        <rect x="0" y="0" width="16" height="16" rx="3" fill="#E8D8D6"/>
        <text x="24" y="13" font-family="'DM Mono',monospace" font-size="12" fill="#7A5560">medium.com</text>
      </g>

      <!-- title -->
      <text x="22" y="114" font-family="'DM Serif Display',serif" font-size="24" fill="#2A1520" font-weight="400">
        Nassim Taleb ·
      </text>
      <text x="22" y="142" font-family="'DM Serif Display',serif" font-size="22" fill="#2A1520" font-weight="400">
        The Black Swan, revisited
      </text>

      <!-- AI question · italic with rose left bar -->
      <line x1="22" y1="170" x2="22" y2="232" stroke="#F5C0BE" stroke-width="3" stroke-linecap="round"/>
      <text x="38" y="192" font-family="'Source Serif 4','Noto Serif SC',serif" font-size="16" font-style="italic" fill="#2A1520">
        那场金融危机的余震
      </text>
      <text x="38" y="216" font-family="'Source Serif 4','Noto Serif SC',serif" font-size="16" font-style="italic" fill="#2A1520">
        你现在还在想它吗?
      </text>

      <!-- cluster chip -->
      <g transform="translate(22, 250)">
        <rect x="0" y="0" width="132" height="30" rx="15" fill="#EEEEF8"/>
        <text x="66" y="20" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="12" fill="#9CA3D4" text-anchor="middle">投资与金融市场</text>
      </g>

      <!-- 二向决策按钮 (大) -->
      <g transform="translate(22, 296)">
        <rect x="0" y="0" width="172" height="64" rx="10" fill="#FFFFFF" stroke="#E8D8D6" stroke-width="1.5" filter="url(#softShadow)"/>
        <text x="86" y="40" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="15" fill="#9CA3D4" text-anchor="middle" font-weight="600">
          📌 留下来
        </text>

        <rect x="184" y="0" width="172" height="64" rx="10" fill="#FFFFFF" stroke="#E8D8D6" stroke-width="1.5" filter="url(#softShadow)"/>
        <text x="270" y="40" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="15" fill="#D9706A" text-anchor="middle" font-weight="600">
          🌸 放手
        </text>
      </g>
    </g>

    <!-- 底部入口 · 完整书房 -->
    <g transform="translate(28, 514)">
      <rect x="0" y="0" width="384" height="86" rx="12" fill="#FDF0EF" stroke="#F5C0BE" stroke-width="1"/>
      <text x="192" y="34" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="15" font-weight="600" fill="#2A1520" text-anchor="middle">
        打开完整书房 →
      </text>
      <text x="192" y="60" font-family="'DM Sans','Noto Sans SC',sans-serif" font-size="11" fill="#7A5560" text-anchor="middle" letter-spacing="0.8">
        候响室  ·  隐性自我  ·  兴趣地形  ·  周回顾
      </text>
    </g>
  </g>

  <!-- 底部 caption 小字 -->
  <text x="640" y="780" font-family="'DM Mono','SF Mono',monospace" font-size="11" letter-spacing="3"
        fill="#B89098" text-anchor="middle">
    A CHROME EXTENSION FOR DIGITAL DE-HOARDING
  </text>
</svg>
