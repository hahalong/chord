<?xml version="1.0" encoding="UTF-8"?>
<!-- Chord Store Screenshot 3 · §3 Terrain · 1280 × 800 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#F5C0BE"/>
      <stop offset="50%" stop-color="#C8B8D8"/>
      <stop offset="100%" stop-color="#A8C8E0"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FDF0EF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFFCFA" stop-opacity="0"/>
    </radialGradient>

    <!-- 4 个地形渐变 -->
    <linearGradient id="swampGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8E0EC"/>
      <stop offset="100%" stop-color="#D8C8DC"/>
    </linearGradient>
    <linearGradient id="forestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#DCE8DC"/>
      <stop offset="100%" stop-color="#B8D0B8"/>
    </linearGradient>
    <linearGradient id="emberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE4DC"/>
      <stop offset="100%" stop-color="#FFC8B8"/>
    </linearGradient>
    <linearGradient id="sleepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E4EC"/>
      <stop offset="100%" stop-color="#C0C8D8"/>
    </linearGradient>

    <filter id="softShadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.12"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="#FFFCFA"/>
  <rect width="1280" height="800" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="1280" height="3" fill="url(#grad)"/>

  <!-- 标题 -->
  <g transform="translate(640, 70)">
    <text x="0" y="0" font-family="'DM Mono','SF Mono',monospace" font-size="12"
          letter-spacing="4" fill="#D9706A" opacity="0.7" text-anchor="middle">
      § 3 · 你的地形
    </text>
    <text x="0" y="40" font-family="'DM Serif Display','Noto Serif SC',serif"
          font-size="34" fill="#2A1520" text-anchor="middle" letter-spacing="-0.3">
      四种地形 · 用隐喻看清你的兴趣分布
    </text>
    <text x="0" y="72" font-family="'Source Serif 4','Noto Serif SC',serif"
          font-size="17" font-style="italic" fill="#7A5560" text-anchor="middle">
      不是评判 · 是给你一个看清自己的镜子
    </text>
  </g>

  <!-- 2×2 网格 -->
  <!-- 焦虑沼泽 -->
  <g transform="translate(140, 220)" filter="url(#softShadow)">
    <rect x="0" y="0" width="490" height="240" rx="18" fill="url(#swampGrad)" stroke="#C0B0C8" stroke-width="1"/>

    <!-- icon · 沼泽 -->
    <g transform="translate(36, 36)" opacity="0.6">
      <ellipse cx="30" cy="50" rx="32" ry="10" fill="#A090B0"/>
      <ellipse cx="30" cy="40" rx="25" ry="6" fill="#9080A0"/>
      <!-- 芦苇 -->
      <line x1="15" y1="40" x2="15" y2="15" stroke="#8070A0" stroke-width="2"/>
      <line x1="45" y1="42" x2="45" y2="18" stroke="#8070A0" stroke-width="2"/>
    </g>

    <text x="120" y="60" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="24" font-weight="600" fill="#2A1520">
      焦虑沼泽
    </text>
    <text x="120" y="84" font-family="'DM Mono',monospace" font-size="11" letter-spacing="2" fill="#9080A0">
      ANXIETY SWAMP · 旧学英语方法
    </text>

    <text x="36" y="138" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      你存了 12 条「学英语方法」
    </text>
    <text x="36" y="166" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      只有 1 条真正进入过你的注意力
    </text>

    <!-- stats -->
    <g transform="translate(36, 195)">
      <text x="0" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">12 条</text>
      <text x="80" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">真用 4%</text>
      <text x="180" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">等了 14 个月</text>
    </g>
  </g>

  <!-- 真实热情之林 -->
  <g transform="translate(650, 220)" filter="url(#softShadow)">
    <rect x="0" y="0" width="490" height="240" rx="18" fill="url(#forestGrad)" stroke="#A0C0A0" stroke-width="1"/>

    <!-- icon · 树林 -->
    <g transform="translate(36, 36)" opacity="0.7">
      <polygon points="20,55 8,30 32,30" fill="#5A8050"/>
      <rect x="17" y="52" width="6" height="10" fill="#704030"/>
      <polygon points="45,55 30,22 60,22" fill="#4A7040"/>
      <rect x="42" y="52" width="6" height="10" fill="#704030"/>
    </g>

    <text x="120" y="60" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="24" font-weight="600" fill="#2A1520">
      真实热情之林
    </text>
    <text x="120" y="84" font-family="'DM Mono',monospace" font-size="11" letter-spacing="2" fill="#608060">
      REAL-PASSION FOREST · 投资与金融市场
    </text>

    <text x="36" y="138" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      投资这块不是收藏
    </text>
    <text x="36" y="166" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      是真在用
    </text>

    <g transform="translate(36, 195)">
      <text x="0" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">40 条</text>
      <text x="80" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">真用 75%</text>
      <text x="180" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">等了 3 个月</text>
    </g>
  </g>

  <!-- 新冒火苗 -->
  <g transform="translate(140, 490)" filter="url(#softShadow)">
    <rect x="0" y="0" width="490" height="240" rx="18" fill="url(#emberGrad)" stroke="#E8B0A0" stroke-width="1"/>

    <!-- icon · 火苗 -->
    <g transform="translate(36, 36)" opacity="0.7">
      <path d="M30 60 Q15 45 25 25 Q30 35 35 25 Q40 35 40 30 Q45 50 30 60 Z" fill="#D97050"/>
      <path d="M30 58 Q22 48 27 32 Q35 50 30 58 Z" fill="#F5A080"/>
    </g>

    <text x="120" y="60" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="24" font-weight="600" fill="#2A1520">
      新冒火苗
    </text>
    <text x="120" y="84" font-family="'DM Mono',monospace" font-size="11" letter-spacing="2" fill="#D97050">
      NEW EMBER · 健身
    </text>

    <text x="36" y="138" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      30 天里突然冒出 5 条
    </text>
    <text x="36" y="166" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      是个开始 · 别让它熄
    </text>

    <g transform="translate(36, 195)">
      <text x="0" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">5 条</text>
      <text x="80" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">全在近 30 天</text>
      <text x="200" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">之前 0</text>
    </g>
  </g>

  <!-- 沉睡之地 -->
  <g transform="translate(650, 490)" filter="url(#softShadow)">
    <rect x="0" y="0" width="490" height="240" rx="18" fill="url(#sleepGrad)" stroke="#A0B0C0" stroke-width="1"/>

    <!-- icon · 月 -->
    <g transform="translate(36, 36)" opacity="0.7">
      <circle cx="35" cy="40" r="22" fill="#A0B0C8"/>
      <circle cx="42" cy="34" r="22" fill="#E0E4EC"/>
      <circle cx="20" cy="20" r="2" fill="#A0B0C8"/>
      <circle cx="55" cy="25" r="1.5" fill="#A0B0C8"/>
    </g>

    <text x="120" y="60" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="24" font-weight="600" fill="#2A1520">
      沉睡之地
    </text>
    <text x="120" y="84" font-family="'DM Mono',monospace" font-size="11" letter-spacing="2" fill="#7080A0">
      DORMANT LAND · 设计灵感
    </text>

    <text x="36" y="138" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      设计灵感这条线
    </text>
    <text x="36" y="166" font-family="'DM Serif Display','Noto Serif SC',serif" font-size="20" fill="#2A1520" font-style="italic">
      5 个月没动过了
    </text>

    <g transform="translate(36, 195)">
      <text x="0" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">4 条</text>
      <text x="80" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">真用 0%</text>
      <text x="180" y="0" font-family="'DM Mono',monospace" font-size="13" fill="#7A5560">5 个月未访</text>
    </g>
  </g>

  <!-- 底部 caption -->
  <text x="640" y="780" font-family="'DM Mono',monospace" font-size="11" letter-spacing="3"
        fill="#B89098" text-anchor="middle">
    HIDDEN SELF · § 3 OF 6 · YOUR INNER TERRAIN
  </text>
</svg>
